<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AURA Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #121933;
      padding: 30px;
      border-radius: 18px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 38px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #2a3568;
      background: #fff;
      color: #111;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary {
      background: #6ea8fe;
      color: #111;
    }

    .btn-secondary {
      background: #1d2852;
      color: #fff;
    }

    .btn-google {
      background: #fff;
      color: #111;
    }

    .link-btn {
      margin-top: 16px;
      color: #9dc2ff;
      cursor: pointer;
      text-decoration: underline;
    }

    #msg {
      margin-top: 14px;
      min-height: 22px;
      color: yellow;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>AURA</h2>

    <input id="email" type="email" placeholder="Seu email">
    <input id="password" type="password" placeholder="Sua senha">

    <button class="btn-primary" onclick="login()">Entrar</button>
    <button class="btn-secondary" onclick="signup()">Criar conta</button>

    <p>ou</p>

    <button class="btn-google" onclick="loginWithGoogle()">Entrar com Google</button>

    <div class="link-btn" onclick="recoverPassword()">Esqueci minha senha</div>

    <p id="msg"></p>
  </div>

  <script type="module" src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
